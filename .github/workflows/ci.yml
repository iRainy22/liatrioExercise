name: ci

on:
  push:
    branches: 
      - "main"
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Copy Files
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t api .

      - name: Run container
        run: |
          docker run -d --rm --name api -p 80:80 api
          sleep 5
          docker ps --filter "name=api"

      - name: Test Apprentice Action
        uses: liatrio/github-actions/apprentice-action@master

      - name: Stop container
        if: always()
        run: docker stop api || true
